appId: com.suncode.app
productName: SunCode
directories:
  buildResources: resources
  output: release
files:
  - dist-electron
  - dist

# ===== Windows =====
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # icon: resources/icon.ico

# ===== macOS =====
mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.developer-tools
  identity: null
  # icon: resources/icon.png

# ===== Linux =====
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  # icon: resources/icon.png

# ===== NSIS 安装器（Windows）=====
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SunCode

# ===== 发布到 GitHub Releases =====
publish:
  provider: github
  owner: sunheyi6
  repo: SunCode
  releaseType: draft
