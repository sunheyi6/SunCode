appId: com.suncode.app
productName: SunCode
directories:
  buildResources: resources
  output: release
files:
  - dist-electron
  - dist
win:
  target:
    - nsis
  icon: resources/icon.ico
mac:
  target:
    - dmg
  icon: resources/icon.png
linux:
  target:
    - AppImage
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
