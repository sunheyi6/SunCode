appId: com.suncode.app
productName: SunCode
directories:
  buildResources: resources
  output: release
files:
  - dist-electron
  - dist

# ===== Windows =====
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # icon: resources/icon.ico

# ===== macOS =====
mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.developer-tools
  identity: null
  # icon: resources/icon.png

# ===== Linux =====
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  maintainer: SunCode Team <suncode@users.noreply.github.com>
  # icon: resources/icon.png

# ===== NSIS 安装器（Windows）=====
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: always
  shortcutName: SunCode
  uninstallDisplayName: SunCode
  # Keep user data (sessions, settings) when uninstalling.
  deleteAppDataOnUninstall: false
  # Embed the version in the installer filename so users can tell builds apart.
  artifactName: SunCode-Setup-${version}.${ext}

# ===== 发布到 GitHub Releases =====
publish:
  provider: github
  owner: sunheyi6
  repo: SunCode
  releaseType: draft
