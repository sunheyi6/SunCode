name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Validate YAML syntax
        run: npm run lint:yaml
